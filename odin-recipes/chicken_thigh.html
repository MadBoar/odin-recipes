<body>
    
    <h1>Chicken Thigh</h1>
    <img src="../images/chicken_thigh.jpeg">
    <p>Pan fried chicken thigh</p>
    <h2>Ingredients</h2>
    <ul>
        <li>Chicken thigh</li>
        <li>Garlic</li>
        <li>Ginger</li>
        <li>Soy Sauce</li>
        <li>Oyster Sauce</li>
        <li>Rice Wine Vinegar</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Mix soy sauce, oyster sauce, rice wine vinegar</li>
        <li>Marinade chicken thigh for 30 minutes</li>
        <li>Pan fry for 15-25 minutes</li>
    </ol>
